appId: com.factorysim.app
productName: FactorySim
directories:
  buildResources: resources
  output: release

files:
  - dist/**/*
  - package.json

extraResources:
  - from: python
    to: python
    filter:
      - "**/*"
      - "!**/__pycache__"
      - "!**/*.pyc"
      - "!**/tests"

win:
  target:
    - target: nsis
      arch:
        - x64
  icon: resources/icon.ico

mac:
  target:
    - target: dmg
      arch:
        - x64
        - arm64
  icon: resources/icon.icns
  category: public.app-category.developer-tools

linux:
  target:
    - target: AppImage
      arch:
        - x64
  icon: resources/icon.png
  category: Development

nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  installerIcon: resources/icon.ico
  uninstallerIcon: resources/icon.ico
  installerHeaderIcon: resources/icon.ico

dmg:
  contents:
    - x: 130
      y: 220
    - x: 410
      y: 220
      type: link
      path: /Applications

publish:
  provider: github
  owner: adrisandeoca-coder
  repo: FactorySim
