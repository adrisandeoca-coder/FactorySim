name: Deploy Landing Page to GitHub Pages

on:
  push:
    branches: [main]
    paths: [landing/**, docs/screenshots/**, resources/icon.png, resources/favicon.png]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - name: Prepare site assets
        run: |
          mkdir -p landing/resources landing/docs/screenshots
          cp resources/icon.png resources/favicon.png landing/resources/
          cp docs/screenshots/*.png landing/docs/screenshots/

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: landing

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
